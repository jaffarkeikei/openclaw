services:
  - type: web
    name: logentic-relay
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      # Render assigns PORT automatically — entrypoint passes it to the gateway.
      - key: PORT
        value: "8080"

      # OpenClaw state + workspace (persisted on the disk below).
      - key: OPENCLAW_STATE_DIR
        value: /data/.openclaw
      - key: OPENCLAW_WORKSPACE_DIR
        value: /data/workspace

      # Gateway auth token — auto-generated by Render on first deploy.
      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true

      # ── AI model ──────────────────────────────────────────────────────────
      # Default: Anthropic Claude Haiku (fast, cheap for relay agents).
      # To use NVIDIA NIM instead, set OPENCLAW_MODEL to:
      #   openai/nvidia/llama-3.1-nemotron-70b-instruct
      # and set OPENAI_API_KEY to your NVIDIA API key, OPENAI_BASE_URL to
      #   https://integrate.api.nvidia.com/v1
      - key: ANTHROPIC_API_KEY
        sync: false

      # Optional: override model (e.g. NVIDIA NIM via OpenAI-compat endpoint).
      - key: OPENCLAW_MODEL
        value: "anthropic:claude-haiku-4-5-20251001"

      # ── Telegram bots ─────────────────────────────────────────────────────
      # Create two bots via @BotFather and paste the tokens here.
      # Seller bot  → messages routed to seller-agent
      # Buyer bot   → messages routed to buyer-agent
      - key: TELEGRAM_SELLER_BOT_TOKEN
        sync: false
      - key: TELEGRAM_BUYER_BOT_TOKEN
        sync: false

      # ── Logentic backend ──────────────────────────────────────────────────
      # URL of the Logentic negotiation backend (set after deploying backend).
      # Relay agents will forward deal events here.
      - key: LOGENTIC_WEBHOOK_URL
        sync: false

    disk:
      name: logentic-relay-data
      mountPath: /data
      sizeGB: 1
