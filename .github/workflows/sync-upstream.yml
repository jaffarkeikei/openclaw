name: Sync Upstream OpenClaw

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * 1"

permissions:
  contents: write

jobs:
  sync-upstream:
    runs-on: ubuntu-latest

    steps:
      - name: Check out fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Merge upstream main into fork main
        id: merge
        run: |
          set -euo pipefail

          git remote add upstream https://github.com/openclaw/openclaw.git || true
          git fetch upstream main
          git fetch origin main

          git checkout -B main origin/main
          git reset --hard origin/main

          if git merge --no-commit --no-ff upstream/main; then
            # Keep this fork's workflow files unchanged so GITHUB_TOKEN can push the sync branch
            # without requiring elevated workflow-file write permissions.
            git restore --source=origin/main --staged --worktree -- .github/workflows || true

            if git diff --quiet --cached && git diff --quiet; then
              git merge --abort || true
              echo "has_changes=false" >> "$GITHUB_OUTPUT"
            else
              git commit -m "chore: sync upstream openclaw/main"
              if git diff --quiet origin/main...HEAD; then
                echo "has_changes=false" >> "$GITHUB_OUTPUT"
              else
                echo "has_changes=true" >> "$GITHUB_OUTPUT"
              fi
            fi
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "merge_conflict=true" >> "$GITHUB_OUTPUT"
            git merge --abort || true
          fi

      - name: Push direct sync to fork main
        if: steps.merge.outputs.has_changes == 'true'
        run: |
          git push origin HEAD:main

      - name: Report no-op sync
        if: steps.merge.outputs.has_changes != 'true' && steps.merge.outputs.merge_conflict != 'true'
        run: |
          echo "No upstream changes to sync."

      - name: Fail when merge conflict needs manual resolution
        if: steps.merge.outputs.merge_conflict == 'true'
        run: |
          echo "::error::Upstream sync hit merge conflicts. Resolve manually using UPSTREAM_SYNC.md."
          exit 1
