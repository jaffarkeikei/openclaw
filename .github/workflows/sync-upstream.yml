name: Sync Upstream OpenClaw

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-upstream:
    runs-on: ubuntu-latest

    steps:
      - name: Check out fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Merge upstream main into sync branch
        id: merge
        run: |
          set -euo pipefail

          git remote add upstream https://github.com/openclaw/openclaw.git || true
          git fetch upstream main
          git fetch origin main

          git checkout -B main origin/main
          git reset --hard origin/main

          if git merge --no-ff --no-edit upstream/main; then
            if git diff --quiet origin/main...HEAD; then
              echo "has_changes=false" >> "$GITHUB_OUTPUT"
            else
              echo "has_changes=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "merge_conflict=true" >> "$GITHUB_OUTPUT"
            git merge --abort || true
          fi

      - name: Create sync pull request
        id: create_pr
        if: steps.merge.outputs.has_changes == 'true'
        continue-on-error: true
        uses: peter-evans/create-pull-request@v7
        with:
          branch: sync/upstream-main
          base: main
          delete-branch: false
          title: "chore: sync upstream openclaw/main"
          commit-message: "chore: sync upstream openclaw/main"
          body: |
            Automated upstream sync PR.

            - Source: `openclaw/openclaw@main`
            - Target: `jaffarkeikei/openclaw@main`

            Please run smoke tests before merge.

      - name: Warn when PR creation is blocked by repo settings
        if: steps.merge.outputs.has_changes == 'true' && steps.create_pr.outcome == 'failure'
        run: |
          echo "::warning::Branch sync/upstream-main was pushed, but PR creation failed."
          echo "::warning::Enable repository setting: Actions -> General -> Workflow permissions -> Allow GitHub Actions to create and approve pull requests."

      - name: Fail when merge conflict needs manual resolution
        if: steps.merge.outputs.merge_conflict == 'true'
        run: |
          echo "::error::Upstream sync hit merge conflicts. Resolve manually using UPSTREAM_SYNC.md."
          exit 1
